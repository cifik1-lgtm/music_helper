<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Help</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #app {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin: 25px;
            width: 95%;
            max-width: 1100px;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            color: #28a745; /* Green */
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 600;
        }

        h2 {
            color: #555;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        #controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background-color: #e9f5ee; /* Light green background */
            border-radius: 10px;
            gap: 20px;
        }

        #instrument-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            flex-grow: 1;
        }

        .instrument-button {
            padding: 12px 20px;
            border: 1px solid #c8e6c9; /* Light green border */
            border-radius: 6px;
            background-color: #e0ffe0; /* Even lighter green */
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            transition: all 0.2s ease;
            color: #333;
            outline: none;
        }

        .instrument-button:hover {
            background-color: #d0f0d0;
            border-color: #a3d9a3;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .instrument-button.active {
            background-color: #28a745; /* Darker green */
            color: white;
            border-color: #28a745;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }

        #volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        #masterVolume {
            width: 180px;
            -webkit-appearance: none;
            height: 8px;
            background: #d8eadc; /* Light green track */
            border-radius: 5px;
            outline: none;
            transition: opacity .2s;
        }

        #masterVolume::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #28a745; /* Green thumb */
            cursor: pointer;
            box-shadow: 0 0 4px rgba(0,0,0,0.3);
        }

        #masterVolume::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #28a745;
            cursor: pointer;
        }

        #keyboard {
            display: flex;
            justify-content: center;
            margin-top: 30px;
            padding-bottom: 25px;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .key {
            width: 50px;
            height: 160px;
            background-color: #ffffff;
            border: 1px solid #bbb;
            border-radius: 0 0 8px 8px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.15);
            position: relative;
            margin: 0 -1px; /* Overlap borders slightly */
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 12px;
            font-size: 0.9em;
            color: #333;
            transition: background-color 0.1s ease;
            z-index: 0; /* Ensure white keys are behind black keys */
        }

        .key.black {
            width: 35px;
            height: 100px;
            background-color: #222;
            border: 1px solid #000;
            position: absolute;
            z-index: 1; /* Black keys on top */
            top: 0;
            margin-left: -17.5px; /* Half of its width */
            color: #eee;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            font-size: 0.8em;
            padding-bottom: 8px;
            transition: background-color 0.1s ease;
        }

        .key:active, .key.active-play {
            background-color: #b3e0ff; /* Light blue for active white keys */
            box-shadow: inset 1px 1px 5px rgba(0,0,0,0.2);
            transform: translateY(1px);
        }
        .key.black:active, .key.black.active-play {
            background-color: #444; /* Darker gray for active black keys */
            box-shadow: inset 1px 1px 5px rgba(0,0,0,0.3);
            transform: translateY(1px);
        }

        /* Adjust positions for black keys (relative to their previous white key) */
        .key[data-note="C#4"] { left: calc(50px * 1 - 17.5px); } /* Between C4 and D4 */
        .key[data-note="D#4"] { left: calc(50px * 2 - 17.5px); } /* Between D4 and E4 */
        .key[data-note="F#4"] { left: calc(50px * 4 - 17.5px); } /* Between F4 and G4 */
        .key[data-note="G#4"] { left: calc(50px * 5 - 17.5px); } /* Between G4 and A4 */
        .key[data-note="A#4"] { left: calc(50px * 6 - 17.5px); } /* Between A4 and B4 */
        .key[data-note="C#5"] { left: calc(50px * 8 - 17.5px); } /* Between C5 and D5 */
        .key[data-note="D#5"] { left: calc(50px * 9 - 17.5px); } /* Between D5 and E5 */


        #microphone-section {
            margin-top: 40px;
            padding: 25px;
            background-color: #f0f7f0; /* Very light green */
            border-radius: 10px;
            text-align: center;
            border: 1px solid #e0ffe0;
        }

        #toggleMic {
            padding: 12px 25px;
            font-size: 1.05em;
            background-color: #007bff; /* Blue */
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        #toggleMic:hover {
            background-color: #0056b3;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        #micStatus {
            margin-top: 15px;
            font-weight: 600;
            color: #555;
        }

        #visualizer {
            background-color: #333;
            border-radius: 5px;
            margin-top: 20px;
            width: 100%;
            height: 120px;
            max-width: 500px;
            border: 1px solid #555;
            display: block; /* Center the canvas */
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 768px) {
            #app {
                margin: 15px;
                padding: 20px;
            }
            h1 {
                font-size: 2em;
            }
            .instrument-button {
                padding: 10px 15px;
                font-size: 0.9em;
            }
            #controls {
                flex-direction: column;
                gap: 15px;
            }
            #masterVolume {
                width: 120px;
            }
            .key {
                width: 40px;
                height: 130px;
                font-size: 0.8em;
                padding-bottom: 8px;
            }
            .key.black {
                width: 28px;
                height: 80px;
                font-size: 0.7em;
                padding-bottom: 5px;
                margin-left: -14px;
            }
             /* Re-adjust positions for black keys based on new white key width */
            .key[data-note="C#4"] { left: calc(40px * 1 - 14px); }
            .key[data-note="D#4"] { left: calc(40px * 2 - 14px); }
            .key[data-note="F#4"] { left: calc(40px * 4 - 14px); }
            .key[data-note="G#4"] { left: calc(40px * 5 - 14px); }
            .key[data-note="A#4"] { left: calc(40px * 6 - 14px); }
            .key[data-note="C#5"] { left: calc(40px * 8 - 14px); }
            .key[data-note="D#5"] { left: calc(40px * 9 - 14px); }

            #visualizer {
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>Music Help</h1>

        <div id="controls">
            <div id="instrument-selector">
                <button class="instrument-button active" data-instrument="piano">Piano</button>
                <button class="instrument-button" data-instrument="violin">Violin</button>
                <button class="instrument-button" data-instrument="guitar">Guitar</button>
                <button class="instrument-button" data-instrument="electric_guitar">Electric Guitar</button>
                <button class="instrument-button" data-instrument="bass">Bass</button>
                <button class="instrument-button" data-instrument="trumpet">Trumpet</button>
                <button class="instrument-button" data-instrument="recorder">Recorder</button>
                <button class="instrument-button" data-instrument="keypad">Keypad</button>
                <button class="instrument-button" data-instrument="drums_kick">Kick</button>
                <button class="instrument-button" data-instrument="drums_snare">Snare</button>
                <button class="instrument-button" data-instrument="drums_hihat">Hi-Hat</button>
            </div>
            <div id="volume-control">
                <label for="masterVolume">Master Volume:</label>
                <input type="range" id="masterVolume" min="0" max="1" step="0.01" value="0.7">
            </div>
        </div>

        <h2>Virtual Keyboard</h2>
        <div id="keyboard">
            <!-- White Keys (C4 to E5) -->
            <div class="key" data-note="C4">C4</div>
            <div class="key" data-note="D4">D4</div>
            <div class="key" data-note="E4">E4</div>
            <div class="key" data-note="F4">F4</div>
            <div class="key" data-note="G4">G4</div>
            <div class="key" data-note="A4">A4</div>
            <div class="key" data-note="B4">B4</div>
            <div class="key" data-note="C5">C5</div>
            <div class="key" data-note="D5">D5</div>
            <div class="key" data-note="E5">E5</div>

            <!-- Black Keys (Sharps and Flats) -->
            <div class="key black" data-note="C#4">C#4</div>
            <div class="key black" data-note="D#4">D#4</div>
            <div class="key black" data-note="F#4">F#4</div>
            <div class="key black" data-note="G#4">G#4</div>
            <div class="key black" data-note="A#4">A#4</div>
            <div class="key black" data-note="C#5">C#5</div>
            <div class="key black" data-note="D#5">D#5</div>
        </div>

        <div id="microphone-section">
            <h2>Voice / Microphone Input</h2>
            <button id="toggleMic">Start Microphone Input</button>
            <p id="micStatus">Microphone: Off</p>
            <canvas id="visualizer"></canvas>
        </div>
    </div>

    <script>
        let audioContext;
        let masterGain;
        let activeInstrument = 'piano';
        const activeOscillators = new Map(); // Stores {note: {osc, gainNode}} for sustained notes
        let micStream = null;
        let micSource = null;
        let analyser = null;
        let visualizerCanvas;
        let visualizerCtx;
        let animationFrameId;

        // Instrument definitions with ADSR envelope parameters, waveform, initial volume, and optional detune/octave offset
        const instruments = {
            piano: { waveform: 'sawtooth', attack: 0.01, decay: 0.8, sustain: 0.1, release: 0.1, volume: 0.5 },
            violin: { waveform: 'sawtooth', attack: 0.3, decay: 1.2, sustain: 0.7, release: 0.5, volume: 0.6, detune: 5 }, // Slight detune for vibrato effect
            guitar: { waveform: 'triangle', attack: 0.02, decay: 0.4, sustain: 0.05, release: 0.05, volume: 0.7 },
            electric_guitar: { waveform: 'square', attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.1, volume: 0.7, detune: 10 }, // More edgy sound
            bass: { waveform: 'sine', attack: 0.05, decay: 0.6, sustain: 0.4, release: 0.2, volume: 0.8, octaveOffset: -1 }, // Play an octave lower
            trumpet: { waveform: 'square', attack: 0.1, decay: 0.5, sustain: 0.6, release: 0.3, volume: 0.6, detune: 15 }, // Brassy sound
            recorder: { waveform: 'triangle', attack: 0.05, decay: 0.4, sustain: 0.5, release: 0.2, volume: 0.7 },
            keypad: { waveform: 'sine', attack: 0.01, decay: 0.1, sustain: 0.0, release: 0.01, volume: 0.4 }, // Short, clean plink
        };

        // Base frequencies for the 4th octave (e.g., A4 is 440 Hz)
        const baseNoteFrequencies = {
            'C': 261.63, 'C#': 277.18, 'D': 293.66, 'D#': 311.13, 'E': 329.63, 'F': 349.23,
            'F#': 369.99, 'G': 392.00, 'G#': 415.30, 'A': 440.00, 'A#': 466.16, 'B': 493.88
        };

        /**
         * Calculates the frequency for a given note (e.g., "C4", "G#5").
         * @param {string} note The note string (e.g., "C4").
         * @returns {number} The frequency in Hz.
         */
        function getFrequency(note) {
            const regex = /([A-G]#?)(\d)/;
            const match = note.match(regex);
            if (!match) {
                console.warn(`Invalid note format: ${note}`);
                return 0;
            }

            const noteName = match[1]; // e.g., "C", "C#"
            const octave = parseInt(match[2], 10); // e.g., 4, 5
            let baseFreq = baseNoteFrequencies[noteName];

            // Adjust frequency based on octave relative to octave 4 (where baseNoteFrequencies are defined)
            const octaveDifference = octave - 4;
            return baseFreq * Math.pow(2, octaveDifference);
        }

        /**
         * Initializes the AudioContext and master gain node if not already done.
         * This function should be called after a user gesture to comply with browser autoplay policies.
         */
        function initializeAudioContext() {
            if (!audioContext || audioContext.state === 'suspended') {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioContext.createGain();
                masterGain.gain.value = parseFloat(document.getElementById('masterVolume').value);
                masterGain.connect(audioContext.destination);
                console.log('AudioContext initialized or resumed.');
            }
        }

        /**
         * Plays a musical note using the currently active instrument or a specified one.
         * Applies a basic ADSR envelope.
         * @param {string} note The note to play (e.g., "C4").
         * @param {string} [instrumentName=activeInstrument] The instrument to use.
         */
        function playNote(note, instrumentName = activeInstrument) {
            initializeAudioContext();
            const instrument = instruments[instrumentName];
            if (!instrument) {
                console.warn(`Instrument '${instrumentName}' not found.`);
                return;
            }

            let frequency = getFrequency(note);
            if (instrument.octaveOffset) {
                frequency *= Math.pow(2, instrument.octaveOffset);
            }

            // Stop any existing oscillator for this note to retrigger the sound
            if (activeOscillators.has(note)) {
                stopNote(note, instrumentName);
            }

            const now = audioContext.currentTime;

            const osc = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            osc.type = instrument.waveform;
            osc.frequency.setValueAtTime(frequency, now);
            if (instrument.detune) {
                osc.detune.setValueAtTime(instrument.detune, now);
            }

            // ADSR Envelope
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(instrument.volume, now + instrument.attack);
            gainNode.gain.exponentialRampToValueAtTime(instrument.volume * instrument.sustain, now + instrument.attack + instrument.decay);

            osc.connect(gainNode);
            gainNode.connect(masterGain);
            osc.start(now);

            activeOscillators.set(note, { osc, gainNode }); // Store for stopping
        }

        /**
         * Stops a playing musical note, applying the release phase of the ADSR envelope.
         * @param {string} note The note to stop.
         * @param {string} [instrumentName=activeInstrument] The instrument used for the note.
         */
        function stopNote(note, instrumentName = activeInstrument) {
            if (!audioContext || audioContext.state === 'suspended') return;
            const active = activeOscillators.get(note);
            if (!active) return;

            const { osc, gainNode } = active;
            const instrument = instruments[instrumentName];
            if (!instrument) return;

            const now = audioContext.currentTime;
            gainNode.gain.cancelScheduledValues(now); // Clear any pending ramps
            gainNode.gain.exponentialRampToValueAtTime(0.0001, now + instrument.release); // Fade out
            osc.stop(now + instrument.release); // Stop oscillator after release phase
            
            // Clean up nodes after they have finished playing
            osc.onended = () => {
                osc.disconnect();
                gainNode.disconnect();
            };
            activeOscillators.delete(note);
        }

        let whiteNoiseBuffer = null;
        /**
         * Creates a static white noise buffer for drum sounds.
         */
        function createWhiteNoiseBuffer() {
            if (!audioContext) { // Ensure audio context is initialized before creating buffer
                initializeAudioContext();
            }
            const bufferSize = audioContext.sampleRate * 0.5; // 0.5 seconds of noise
            whiteNoiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const output = whiteNoiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1; // Random values between -1 and 1
            }
        }

        /**
         * Plays a drum sound (kick, snare, or hi-hat).
         * @param {string} drumType The type of drum to play ('drums_kick', 'drums_snare', 'drums_hihat').
         */
        function playDrum(drumType) {
            initializeAudioContext();
            const now = audioContext.currentTime;
            let gainNode = audioContext.createGain();
            gainNode.connect(masterGain);

            switch (drumType) {
                case 'drums_kick':
                    const kickOsc = audioContext.createOscillator();
                    kickOsc.type = 'sine';
                    kickOsc.frequency.setValueAtTime(120, now); // Start frequency
                    kickOsc.frequency.exponentialRampToValueAtTime(30, now + 0.2); // Decay to low frequency
                    gainNode.gain.setValueAtTime(1, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3); // Quick volume decay
                    kickOsc.connect(gainNode);
                    kickOsc.start(now);
                    kickOsc.stop(now + 0.3);
                    break;
                case 'drums_snare':
                    if (!whiteNoiseBuffer) createWhiteNoiseBuffer();
                    
                    // Noise component
                    const noiseSource = audioContext.createBufferSource();
                    noiseSource.buffer = whiteNoiseBuffer;
                    const noiseFilter = audioContext.createBiquadFilter(); // Shape the noise
                    noiseFilter.type = 'bandpass';
                    noiseFilter.frequency.setValueAtTime(2000, now);
                    noiseFilter.Q.setValueAtTime(0.5, now); // Wider bandpass
                    noiseSource.connect(noiseFilter);
                    noiseFilter.connect(gainNode);

                    // Tone component
                    const toneSource = audioContext.createOscillator();
                    toneSource.type = 'triangle';
                    toneSource.frequency.setValueAtTime(200, now);
                    toneSource.connect(gainNode);

                    gainNode.gain.setValueAtTime(0.7, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2); // Snare decay
                    
                    noiseSource.start(now);
                    noiseSource.stop(now + 0.2);
                    toneSource.start(now);
                    toneSource.stop(now + 0.2);
                    break;
                case 'drums_hihat':
                    if (!whiteNoiseBuffer) createWhiteNoiseBuffer();
                    const hihatSource = audioContext.createBufferSource();
                    hihatSource.buffer = whiteNoiseBuffer;
                    const hihatFilter = audioContext.createBiquadFilter(); // Shape the noise
                    hihatFilter.type = 'highpass';
                    hihatFilter.frequency.setValueAtTime(7000, now);
                    hihatFilter.Q.setValueAtTime(0.5, now);
                    hihatSource.connect(hihatFilter);
                    hihatFilter.connect(gainNode);

                    gainNode.gain.setValueAtTime(0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1); // Quick hi-hat decay
                    hihatSource.start(now);
                    hihatSource.stop(now + 0.1);
                    break;
            }
        }

        /**
         * Toggles microphone input on and off.
         * Requests microphone permission if not already granted.
         * Connects mic input to an analyser for visualization.
         */
        async function toggleMicrophone() {
            initializeAudioContext();
            const micStatusElem = document.getElementById('micStatus');
            const toggleMicButton = document.getElementById('toggleMic');

            if (micStream) { // If mic is currently active, stop it
                micStream.getTracks().forEach(track => track.stop());
                micStream = null;
                if (micSource) micSource.disconnect();
                if (analyser) analyser.disconnect();
                cancelAnimationFrame(animationFrameId); // Stop visualization
                micStatusElem.textContent = 'Microphone: Off';
                toggleMicButton.textContent = 'Start Microphone Input';
                console.log('Microphone input stopped.');
                visualizerCtx.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
                visualizerCtx.fillStyle = '#333';
                visualizerCtx.fillRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
            } else { // Start mic
                try {
                    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    micSource = audioContext.createMediaStreamSource(micStream);
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 256; // Fast Fourier Transform size

                    micSource.connect(analyser);
                    // Optional: Uncomment the line below to hear your microphone input through the speakers
                    // analyser.connect(masterGain); 
                    
                    micStatusElem.textContent = 'Microphone: On (Visualizing)';
                    toggleMicButton.textContent = 'Stop Microphone Input';
                    console.log('Microphone input started.');
                    drawVisualizer(); // Start visualizer
                } catch (err) {
                    console.error('Error accessing microphone:', err);
                    micStatusElem.textContent = `Microphone: Error (${err.name})`;
                    alert('Could not access microphone. Please ensure it is connected and permissions are granted.');
                }
            }
        }

        /**
         * Draws the microphone input's frequency data onto the canvas.
         */
        function drawVisualizer() {
            if (!analyser || !visualizerCtx) return;

            animationFrameId = requestAnimationFrame(drawVisualizer);

            const bufferLength = analyser.frequencyBinCount; // Number of data points (fftSize/2)
            const dataArray = new Uint8Array(bufferLength); // Array to hold the data
            analyser.getByteFrequencyData(dataArray); // Fills dataArray with frequency data

            visualizerCtx.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
            visualizerCtx.fillStyle = '#333'; // Background color of the visualizer
            visualizerCtx.fillRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);

            const barWidth = (visualizerCanvas.width / bufferLength) * 2.5; // Adjust bar width for visual appeal
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const barHeight = dataArray[i] / 2; // Scale height for visualization
                visualizerCtx.fillStyle = `rgb(${barHeight + 100}, 50, 50)`; // Color based on amplitude
                visualizerCtx.fillRect(x, visualizerCanvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1; // Space between bars
            }
        }


        // --- Event Listeners and Setup ---
        document.addEventListener('DOMContentLoaded', () => {
            // Set up visualizer canvas context
            visualizerCanvas = document.getElementById('visualizer');
            visualizerCtx = visualizerCanvas.getContext('2d');
            visualizerCtx.fillStyle = '#333';
            visualizerCtx.fillRect(0, 0, visualizerCanvas.width, visualizerCanvas.height); // Initial clear

            // Master volume control
            const masterVolume = document.getElementById('masterVolume');
            masterVolume.addEventListener('input', () => {
                initializeAudioContext(); // Ensure context is awake when user interacts
                if (masterGain) {
                    masterGain.gain.value = parseFloat(masterVolume.value);
                }
            });

            // Instrument selection buttons
            document.querySelectorAll('.instrument-button').forEach(button => {
                button.addEventListener('click', () => {
                    // Remove 'active' class from previously active button
                    document.querySelector('.instrument-button.active')?.classList.remove('active');
                    button.classList.add('active'); // Add 'active' to clicked button
                    activeInstrument = button.dataset.instrument;
                    console.log(`Active instrument: ${activeInstrument}`);
                });
            });

            // Virtual keyboard (mouse/touch events)
            const keys = document.querySelectorAll('.key');
            keys.forEach(key => {
                const note = key.dataset.note;

                const startPlay = (e) => {
                    e.preventDefault(); // Prevent text selection, scrolling on touch
                    // Prevent re-triggering if already playing from a sustained press
                    if (key.classList.contains('active-play')) return; 

                    if (activeInstrument.startsWith('drums_')) {
                        playDrum(activeInstrument);
                    } else {
                        playNote(note, activeInstrument);
                    }
                    key.classList.add('active-play');
                };

                const endPlay = () => {
                    if (!activeInstrument.startsWith('drums_')) { // Drums are one-shot, no stop
                        stopNote(note, activeInstrument);
                    }
                    key.classList.remove('active-play');
                };

                key.addEventListener('mousedown', startPlay);
                key.addEventListener('mouseup', endPlay);
                key.addEventListener('mouseleave', endPlay); // If mouse drags off key while pressed

                // For touch devices (passive: false for preventDefault)
                key.addEventListener('touchstart', startPlay, { passive: false });
                key.addEventListener('touchend', endPlay, { passive: false });
                key.addEventListener('touchcancel', endPlay, { passive: false });
            });


            // Physical keyboard input mapping
            const keyMap = {
                // White keys (bottom row of QWERTY)
                'a': 'C4', 's': 'D4', 'd': 'E4', 'f': 'F4', 'g': 'G4', 'h': 'A4', 'j': 'B4',
                'k': 'C5', 'l': 'D5', ';': 'E5', // For QWERTY keyboards

                // Black keys (top row of QWERTY, shifted)
                'w': 'C#4', 'e': 'D#4', 't': 'F#4', 'y': 'G#4', 'u': 'A#4', 'o': 'C#5', 'p': 'D#5',

                // Drum triggers
                'z': 'drums_kick', 'x': 'drums_snare', 'c': 'drums_hihat'
            };
            const pressedKeys = new Set(); // Track currently pressed physical keys to prevent repeat triggering

            document.addEventListener('keydown', (e) => {
                const mappedInput = keyMap[e.key.toLowerCase()];
                if (mappedInput && !pressedKeys.has(e.key.toLowerCase())) {
                    e.preventDefault(); // Prevent default browser actions (e.g., scrolling with spacebar, 'd' for bookmarks)
                    pressedKeys.add(e.key.toLowerCase());

                    // Visual feedback for physical key press
                    const correspondingKeyElement = document.querySelector(`.key[data-note="${mappedInput}"]`);
                    if (correspondingKeyElement) {
                        correspondingKeyElement.classList.add('active-play');
                    } else if (mappedInput.startsWith('drums_')) {
                        // Highlight the active instrument button for drums if played via keyboard
                        const drumButton = document.querySelector(`[data-instrument="${mappedInput}"]`);
                        if (drumButton) drumButton.classList.add('active-play');
                    }

                    // Play sound
                    if (mappedInput.startsWith('drums_')) {
                        playDrum(mappedInput);
                    } else {
                        playNote(mappedInput, activeInstrument);
                    }
                }
            });

            document.addEventListener('keyup', (e) => {
                const mappedInput = keyMap[e.key.toLowerCase()];
                if (mappedInput && pressedKeys.has(e.key.toLowerCase())) {
                    pressedKeys.delete(e.key.toLowerCase());

                    // Remove visual feedback
                    const correspondingKeyElement = document.querySelector(`.key[data-note="${mappedInput}"]`);
                    if (correspondingKeyElement) {
                        correspondingKeyElement.classList.remove('active-play');
                    } else if (mappedInput.startsWith('drums_')) {
                        const drumButton = document.querySelector(`[data-instrument="${mappedInput}"]`);
                        if (drumButton) drumButton.classList.remove('active-play');
                    }

                    // Stop note (only for sustained instruments)
                    if (!mappedInput.startsWith('drums_')) {
                        stopNote(mappedInput, activeInstrument);
                    }
                }
            });

            // Microphone input toggle button
            document.getElementById('toggleMic').addEventListener('click', toggleMicrophone);

            // Important: Wake up/initialize AudioContext on first user interaction
            // Browsers prevent autoplaying audio, so context must be created/resumed on user gesture.
            const wakeAudio = () => {
                initializeAudioContext();
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume().then(() => {
                        console.log('AudioContext resumed successfully.');
                    }).catch(err => console.error('Error resuming AudioContext:', err));
                }
                document.documentElement.removeEventListener('mousedown', wakeAudio);
                document.documentElement.removeEventListener('keydown', wakeAudio);
                document.documentElement.removeEventListener('touchstart', wakeAudio);
            };
            document.documentElement.addEventListener('mousedown', wakeAudio, { once: true });
            document.documentElement.addEventListener('keydown', wakeAudio, { once: true });
            document.documentElement.addEventListener('touchstart', wakeAudio, { once: true });
        });
    </script>
</body>
</html>
